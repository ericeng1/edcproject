<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>
    (function() {
      var t = localStorage.getItem("showoffy_theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/navigation.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/style.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Collection</title></head>
<body>

  <header class="topbar topbar-with-back">
    <a href="#" class="back-btn" id="back-btn">← Go Back</a>
    <a href="home.html" class="logo">Showoffy</a>
    <nav class="topbar-nav">
      <a href="my-items.html" class="nav-link">My Items</a>
    </nav>
    <div class="topbar-right">
      <button class="nav-link nav-link-signout" id="signout-btn">Sign Out</button>
    </div>
  </header>

  <div class="page-header">
    <h1>My <span>Collection</span></h1>
    <p id="page-subtitle">Your items, grouped by brand</p>
  </div>

  <div class="stats-row" id="stats-row" style="display:none;">
    <div class="stat-chip"><strong id="stat-total">0</strong> Items</div>
    <div class="stat-chip"><strong id="stat-brands">0</strong> Brands</div>
    <div class="stat-chip"><strong id="stat-private">0</strong> Private</div>
  </div>

  <main class="content" id="content">
    <div class="state-msg" id="loading-msg">
      <div class="icon">⬡</div>
      Loading your collection…
    </div>
  </main>

  <script type="module">
    import { supabase } from "./supabaseClient.js";
    import { syncThemeFromUser } from "js/theme.js";

    // Wrap everything in an async IIFE so errors surface visibly
    (async () => {

      // ── AUTH GATE ──
      const { data: { session }, error: sessionError } = await supabase.auth.getSession();
      // Fetch fresh user_metadata from server so theme preference is always current
      supabase.auth.getUser().then(({ data: { user: freshUser } }) => {
        syncThemeFromUser(freshUser?.user_metadata);
      });

      if (sessionError || !session) {
        window.location.href = "login.html";
        return;
      }

      const user = session.user;
      const emailEl = document.getElementById("user-email");
       const { data: profile, profileerror } = await supabase
    .from("profiles")
    .select("username")
    .eq("id", session.user.id)
    .single();

  const username = profile?.username;
      emailEl.innerHTML = `<a href="account.html" style="color:var(--muted);text-decoration:none;transition:color .2s;"
        onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'"
        >${username || user.email}</a>`;

      document.getElementById("signout-btn").addEventListener("click", async () => {
        await supabase.auth.signOut();
        window.location.href = "login.html";
      });

      // ── FETCH ITEMS ──
      const { data: items, error } = await supabase
        .from("items")
        .select(`
          id,
          variant,
          size,
          msrp,
          born_on_date,
          image_url1,
          image_url2,
          image_url3,
          is_private,
          comments,
          extra,
          maker_id,
          brands ( id, company, first_name, last_name ),
          categories ( name ),
          materials ( name )
        `)
        .eq("user_id", user.id)
        .is("deleted_at", null)
        .order("created_at", { ascending: false });

      const mainEl   = document.getElementById("content");
      const loadMsg  = document.getElementById("loading-msg");

      if (error) {
        loadMsg.innerHTML = `<div class="icon">✕</div>Error loading items:<br><small style="color:#e07070">${error.message}</small>`;
        return;
      }

      if (!items || items.length === 0) {
        loadMsg.innerHTML = `
          <div class="icon">◻</div>
          No items yet.<br>
          <a href="index.html" style="color:var(--accent);text-decoration:none;margin-top:8px;display:inline-block;">Add your first item →</a>`;
        return;
      }

      // ── STATS ──
      document.getElementById("stats-row").style.display = "flex";
      document.getElementById("stat-total").textContent   = items.length;
      document.getElementById("stat-brands").textContent  = new Set(items.map(i => i.maker_id)).size;
      document.getElementById("stat-private").textContent = items.filter(i => i.is_private).length;

      // ── GROUP BY BRAND ──
      const grouped = {};
      items.forEach(item => {
        const key = item.maker_id ?? "unknown";
        if (!grouped[key]) grouped[key] = { brand: item.brands, items: [] };
        grouped[key].items.push(item);
      });

      // ── RENDER ──
      mainEl.innerHTML = "";

      Object.values(grouped).forEach((group, groupIdx) => {
        const { brand, items: groupItems } = group;
        const companyName = brand?.company || "Unknown Brand";
        const makerName   = [brand?.first_name, brand?.last_name].filter(Boolean).join(" ").trim();

        const groupEl = document.createElement("div");
        groupEl.className = "brand-group";
        groupEl.style.animationDelay = `${groupIdx * 0.07}s`;

        const makerId = brand?.id ?? null;
        groupEl.innerHTML = `
          <div class="brand-header">
            ${makerId
              ? `<a href="maker.html?id=${makerId}" class="brand-name brand-name-link">${companyName}</a>`
              : `<div class="brand-name">${companyName}</div>`}
            ${makerName ? `<div class="brand-maker">by ${makerName}</div>` : ""}
            <div class="brand-count">${groupItems.length} item${groupItems.length !== 1 ? "s" : ""}</div>
          </div>
          <div class="items-grid" id="grid-${groupIdx}"></div>
        `;

        mainEl.appendChild(groupEl);
        const grid = groupEl.querySelector(`#grid-${groupIdx}`);

        groupItems.forEach((item, idx) => {
          const card = document.createElement("div");
          card.className = `item-card${item.is_private ? " private" : ""}`;
          card.style.animation = `fadeUp 0.4s ease ${(groupIdx * 0.07) + (idx * 0.04)}s both`;
          card.style.cursor = "pointer";
          if (item.user_id === user.id) card.classList.add("owner");

          const imageUrl  = item.image_url1 || item.image_url2 || item.image_url3;
          const imageHtml = imageUrl
            ? `<img class="card-image" src="${imageUrl}" alt="" loading="lazy"
                onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
               <div class="card-image-placeholder" style="display:none">◻</div>`
            : `<div class="card-image-placeholder">◻</div>`;

          const titleParts = [
            item.categories?.name,
            item.variant && item.variant !== "none" ? item.variant : null
          ].filter(Boolean);

          const metaTags = [
            item.materials?.name ? `<span class="meta-tag">${item.materials.name}</span>` : "",
            item.size            ? `<span class="meta-tag">${item.size}"</span>` : "",
            item.born_on_date    ? `<span class="meta-tag">${item.born_on_date}</span>` : "",
          ].filter(Boolean).join("");

          card.innerHTML = `
            ${imageHtml}
            <div class="card-body">
              <div class="card-category">${item.categories?.name || ""}</div>
              <div class="card-title">${titleParts.join(" — ") || "Item"}</div>
              <div class="card-meta">${metaTags}</div>
            </div>
            <div class="card-footer">
              ${item.is_private
                ? `<span class="private-badge">🔒 Private</span>`
                : `<span class="public-badge">Public</span>`}
              ${item.msrp ? `<span class="card-msrp">$${parseFloat(item.msrp).toFixed(2)}</span>` : ""}
            </div>
          `;

          // Add owner edit button
          if (item.user_id === user.id) {
            const menuBtn = document.createElement("a");
            menuBtn.className = "card-menu-btn";
            menuBtn.href = `edit-item.html?id=${item.id}&from=collection`;
            menuBtn.title = "Edit item";
            menuBtn.innerHTML = "⋯";
            menuBtn.addEventListener("click", e => e.stopPropagation());
            card.appendChild(menuBtn);
          }

          // Wrap card in a link to the item detail page
          const link = document.createElement("a");
          link.href = `item.html?id=${item.id}`;
          link.style.cssText = "text-decoration:none;color:inherit;display:block;";
          link.appendChild(card);
          grid.appendChild(link);
        });
      });

    })(); // end async IIFE
  </script>

  <script src="js/navigation.js" defer></script>
  <script src="js/app-fix.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
