<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Collection</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #111213;
      --surface:   #1a1b1d;
      --surface2:  #222426;
      --border:    #2e3033;
      --text:      #e8e6e1;
      --muted:     #777;
      --accent:    #c8964a;
      --accent2:   #7eb8d4;
      --danger:    #c0504a;
      --radius:    8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 70% 40% at 90% 0%, rgba(200,150,74,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 5% 100%, rgba(126,184,212,0.04) 0%, transparent 50%);
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 32px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-brand {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.12em;
      color: var(--accent);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .topbar-email {
      font-size: 13px;
      color: var(--muted);
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 14px;
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .btn-add {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-family: 'Lato', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #111;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.2s;
      letter-spacing: 0.03em;
    }

    .btn-add:hover { opacity: 0.85; }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 48px 32px 32px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .page-header h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(42px, 6vw, 72px);
      letter-spacing: 0.06em;
      line-height: 1;
      color: var(--text);
    }

    .page-header h1 span { color: var(--accent); }

    .page-header p {
      margin-top: 10px;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: flex;
      gap: 12px;
      padding: 0 32px 32px;
      max-width: 1100px;
      margin: 0 auto;
      flex-wrap: wrap;
    }

    .stat-chip {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .stat-chip strong { color: var(--accent); font-weight: 700; margin-right: 5px; }

    /* ── LOADING / EMPTY ── */
    .state-msg {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      font-size: 15px;
    }

    .state-msg .icon { font-size: 40px; margin-bottom: 16px; }

    /* ── BRAND GROUPS ── */
    .content {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 32px 60px;
    }

    .brand-group {
      margin-bottom: 48px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand-header {
      display: flex;
      align-items: baseline;
      gap: 14px;
      margin-bottom: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 0.08em;
      color: var(--text);
    }

    .brand-maker {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .brand-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── ITEM GRID ── */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    /* ── ITEM CARD ── */
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      cursor: default;
      position: relative;
    }

    .item-card:hover {
      border-color: #444;
      transform: translateY(-2px);
    }

    .item-card.private { border-left: 3px solid var(--danger); }

    .card-image {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      background: var(--surface2);
      display: block;
    }

    .card-image-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--border);
      font-size: 32px;
    }

    .card-body {
      padding: 14px 16px;
    }

    .card-category {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 4px;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1.2;
    }

    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .meta-tag {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.03em;
    }

    .meta-tag.highlight { color: var(--accent); border-color: rgba(200,150,74,0.3); }

    .card-footer {
      padding: 10px 16px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
    }

    .private-badge {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--danger);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .public-badge {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .card-msrp {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .topbar { padding: 12px 16px; }
      .topbar-email { display: none; }
      .page-header, .stats-row, .content { padding-left: 16px; padding-right: 16px; }
      .items-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <div class="topbar-brand">Showoffy</div>
    <div class="topbar-right">
      <span class="topbar-email" id="user-email"></span>
      <a href="index.html" class="btn-add">＋ Add Item</a>
      <button class="btn-ghost" id="signout-btn">Sign Out</button>
    </div>
  </header>

  <!-- PAGE HEADER -->
  <div class="page-header">
    <h1>My <span>Collection</span></h1>
    <p id="page-subtitle">Your items, grouped by brand</p>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="stats-row" style="display:none;">
    <div class="stat-chip"><strong id="stat-total">0</strong> Items</div>
    <div class="stat-chip"><strong id="stat-brands">0</strong> Brands</div>
    <div class="stat-chip"><strong id="stat-private">0</strong> Private</div>
  </div>

  <!-- CONTENT -->
  <main class="content" id="content">
    <div class="state-msg" id="loading-msg">
      <div class="icon">⬡</div>
      Loading your collection…
    </div>
  </main>

  <script type="module">
    import { supabase } from "./supabaseClient.js";

    // ── AUTH GATE ──
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) { window.location.href = "login.html"; }
    const user = session.user;

    document.getElementById("user-email").textContent = user.email;
    document.getElementById("signout-btn").addEventListener("click", async () => {
      await supabase.auth.signOut();
      window.location.href = "login.html";
    });

    // ── FETCH ITEMS with joined brand/category/material ──
    const { data: items, error } = await supabase
      .from("items")
      .select(`
        id, variant, size, msrp, born_on_date,
        image_url1, image_url2, image_url3,
        is_private, comments, extra,
        maker_id,
        brands ( id, company, first_name, last_name ),
        categories ( name ),
        materials ( name )
      `)
      .eq("user_id", user.id)
      .order("created_at", { ascending: false });

    const content = document.getElementById("loading-msg");

    if (error) {
      content.innerHTML = `<div class="icon">✕</div>Error loading items: ${error.message}`;
      return;
    }

    if (!items || items.length === 0) {
      content.innerHTML = `
        <div class="icon">◻</div>
        No items yet. <a href="index.html" style="color:var(--accent);text-decoration:none;">Add your first item →</a>`;
      return;
    }

    // ── STATS ──
    const statsRow = document.getElementById("stats-row");
    statsRow.style.display = "flex";
    document.getElementById("stat-total").textContent = items.length;
    const uniqueBrands = new Set(items.map(i => i.maker_id)).size;
    document.getElementById("stat-brands").textContent = uniqueBrands;
    document.getElementById("stat-private").textContent = items.filter(i => i.is_private).length;

    // ── GROUP BY BRAND ──
    const grouped = {};
    items.forEach(item => {
      const brand = item.brands;
      const key = brand ? brand.id : "unknown";
      if (!grouped[key]) grouped[key] = { brand, items: [] };
      grouped[key].items.push(item);
    });

    // ── RENDER ──
    const mainEl = document.getElementById("content");
    mainEl.innerHTML = "";

    Object.values(grouped).forEach((group, groupIdx) => {
      const { brand, items: groupItems } = group;

      const companyName = brand?.company || "Unknown Brand";
      const makerName   = [brand?.first_name, brand?.last_name].filter(Boolean).join(" ");

      const groupEl = document.createElement("div");
      groupEl.className = "brand-group";
      groupEl.style.animationDelay = `${groupIdx * 0.07}s`;

      groupEl.innerHTML = `
        <div class="brand-header">
          <div class="brand-name">${companyName}</div>
          ${makerName ? `<div class="brand-maker">by ${makerName}</div>` : ""}
          <div class="brand-count">${groupItems.length} item${groupItems.length !== 1 ? "s" : ""}</div>
        </div>
        <div class="items-grid" id="grid-${group.brand?.id || 'unknown'}"></div>
      `;

      mainEl.appendChild(groupEl);

      const grid = groupEl.querySelector(".items-grid");

      groupItems.forEach((item, idx) => {
        const card = document.createElement("div");
        card.className = `item-card${item.is_private ? " private" : ""}`;
        card.style.animationDelay = `${(groupIdx * 0.07) + (idx * 0.04)}s`;
        card.style.animation = "fadeUp 0.4s ease both";

        const imageUrl = item.image_url1 || item.image_url2 || item.image_url3;
        const imageHtml = imageUrl
          ? `<img class="card-image" src="${imageUrl}" alt="${companyName} item" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="card-image-placeholder" style="display:none">◻</div>`
          : `<div class="card-image-placeholder">◻</div>`;

        const titleParts = [
          item.categories?.name,
          item.variant && item.variant !== "none" ? item.variant : null
        ].filter(Boolean);
        const cardTitle = titleParts.length ? titleParts.join(" — ") : "Item";

        const metaTags = [
          item.materials?.name ? `<span class="meta-tag">${item.materials.name}</span>` : "",
          item.size           ? `<span class="meta-tag">${item.size}"</span>` : "",
          item.born_on_date   ? `<span class="meta-tag">${item.born_on_date}</span>` : "",
        ].filter(Boolean).join("");

        card.innerHTML = `
          ${imageHtml}
          <div class="card-body">
            <div class="card-category">${item.categories?.name || ""}</div>
            <div class="card-title">${cardTitle}</div>
            <div class="card-meta">${metaTags}</div>
          </div>
          <div class="card-footer">
            ${item.is_private
              ? `<span class="private-badge">🔒 Private</span>`
              : `<span class="public-badge">Public</span>`}
            ${item.msrp ? `<span class="card-msrp">$${parseFloat(item.msrp).toFixed(2)}</span>` : ""}
          </div>
        `;

        grid.appendChild(card);
      });
    });
  </script>

</body>
</html>
