<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <script>
    (function() {
      var t = localStorage.getItem("showoffy_theme") || "dark";
      document.documentElement.setAttribute("data-theme", t);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:ital,wweight@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/navigation.css" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/style.css" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Collection</title>
</head>
<body>

  <header class="topbar topbar-minimal">
    <a href="home.html" class="logo">Showoffy</a>
    <a href="home.html" class="back-link">← Home</a>
  </header>

  <div class="page-header">
    <h1><span id="display-username">Loading</span>'s <span>Collection</span></h1>
    <p id="page-subtitle">Curated items grouped by brand</p>
  </div>

  <div class="stats-row" id="stats-row" style="display:none;">
    <div class="stat-chip"><strong id="stat-total">0</strong> Items</div>
    <div class="stat-chip"><strong id="stat-brands">0</strong> Brands</div>
  </div>

  <main class="content" id="content">
    <div class="state-msg" id="loading-msg">
      <div class="icon">⬡</div>
      Loading collection…
    </div>
  </main>

  <script type="module">
    import { supabase } from "./supabaseClient.js";
    import { syncThemeFromUser } from "./theme.js";

    let displayUsername = "";

    // Get username from URL parameter
    function getUsernameFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('username');
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Fetch items for the given user
    async function fetchUserItems(username) {
      const mainEl = document.getElementById('content');
      const loadMsg = document.getElementById('loading-msg');

      try {
        // First, fetch the user from the profiles table
        const { data: profile, error: profileError } = await supabase
          .from('profiles')
          .select('id, username')
          .eq('username', username)
          .single();

        if (profileError || !profile) {
          loadMsg.style.display = 'none';
          mainEl.innerHTML = `
            <div class="error-msg">
              <div class="icon">✕</div>
              User not found:<br>
              <small>${username}</small>
            </div>`;
          return;
        }

        // Fetch items for this user (only public items)
        const { data: items, error: itemsError } = await supabase
          .from('items')
          .select(`
            id,
            variant,
            size,
            msrp,
            born_on_date,
            image_url1,
            image_url2,
            image_url3,
            is_private,
            comments,
            extra,
            maker_id,
            brands ( id, company, first_name, last_name ),
            categories ( name ),
            materials ( name )
          `)
          .eq('user_id', profile.id)
          .eq('is_private', false)
          .is('deleted_at', null)
          .order('created_at', { ascending: false });

        if (itemsError) {
          throw new Error(itemsError.message);
        }

        if (!items || items.length === 0) {
          loadMsg.innerHTML = `
            <div class="icon">◻</div>
            No public items yet.<br>
            <a href="home.html" style="color:var(--accent);text-decoration:none;margin-top:8px;display:inline-block;">Back to home →</a>`;
          return;
        }

        // Group items by brand
        const grouped = {};
        items.forEach(item => {
          const key = item.maker_id ?? "unknown";
          if (!grouped[key]) grouped[key] = { brand: item.brands, items: [] };
          grouped[key].items.push(item);
        });

        // Update stats
        document.getElementById('stats-row').style.display = 'flex';
        document.getElementById('stat-total').textContent = items.length;
        document.getElementById('stat-brands').textContent = Object.keys(grouped).length;

        // Render items grouped by brand
        mainEl.innerHTML = "";
        let groupIndex = 0;

        Object.values(grouped).forEach((group) => {
          const { brand, items: groupItems } = group;
          const companyName = brand?.company || "Unknown Brand";
          const makerName = [brand?.first_name, brand?.last_name].filter(Boolean).join(" ").trim();
          const makerId = brand?.id ?? null;

          const groupEl = document.createElement("div");
          groupEl.className = "brand-group";
          groupEl.style.animationDelay = `${groupIndex * 0.07}s`;

          // Brand header
          const headerHtml = `
            <div class="brand-header">
              ${makerId
                ? `<a href="maker.html?id=${makerId}" class="brand-name brand-name-link">${escapeHtml(companyName)}</a>`
                : `<div class="brand-name">${escapeHtml(companyName)}</div>`}
              ${makerName ? `<div class="brand-maker">by ${escapeHtml(makerName)}</div>` : ""}
              <div class="brand-count">${groupItems.length} item${groupItems.length !== 1 ? "s" : ""}</div>
            </div>
            <div class="items-grid ${groupItems.length > 4 ? 'collapsed' : ''}" id="grid-${groupIndex}"></div>
            ${groupItems.length > 4 ? `<div class="show-more-container" id="more-${groupIndex}"><button class="show-more-btn" onclick="window.expandGroup(${groupIndex}, ${groupItems.length})">Show all ${groupItems.length} items</button></div>` : ''}
          `;

          groupEl.innerHTML = headerHtml;
          mainEl.appendChild(groupEl);

          const grid = groupEl.querySelector(`#grid-${groupIndex}`);
          const visibleCount = Math.min(4, groupItems.length);

          // Render items
          groupItems.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'item-card';
            card.style.animation = `fadeUp 0.4s ease ${idx * 0.04}s both`;
            card.style.display = idx < visibleCount ? 'block' : 'none';
            card.id = `item-${groupIndex}-${idx}`;

            const imageUrl = item.image_url1 || item.image_url2 || item.image_url3;
            const imageHtml = imageUrl
              ? `<img class="card-image" src="${imageUrl}" alt="" loading="lazy"
                  onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" />
                 <div class="card-image-placeholder" style="display:none">◻</div>`
              : `<div class="card-image-placeholder">◻</div>`;

            const titleParts = [
              item.categories?.name,
              item.variant && item.variant !== "none" ? item.variant : null
            ].filter(Boolean);

            const metaTags = [
              item.materials?.name ? `<span class="meta-tag">${escapeHtml(item.materials.name)}</span>` : "",
              item.size ? `<span class="meta-tag">${escapeHtml(item.size)}"</span>` : "",
              item.born_on_date ? `<span class="meta-tag">${escapeHtml(item.born_on_date)}</span>` : "",
            ].filter(Boolean).join("");

            const msrp = item.msrp ? `<span class="card-msrp">$${parseFloat(item.msrp).toFixed(2)}</span>` : "";

            card.innerHTML = `
              ${imageHtml}
              <div class="card-body">
                <div class="card-category">${escapeHtml(item.categories?.name || 'Item')}</div>
                <div class="card-title">${escapeHtml(titleParts.join(" — ") || "Item")}</div>
                <div class="card-meta">${metaTags}</div>
              </div>
              <div class="card-footer">
              </div>
            `;

            const link = document.createElement('a');
            link.href = `item.html?id=${encodeURIComponent(item.id)}`;
            link.className = 'item-card-link';
            link.appendChild(card);
            grid.appendChild(link);
          });

          groupIndex++;
        });

      } catch (error) {
        console.error('Error fetching items:', error);
        loadMsg.style.display = 'none';
        mainEl.innerHTML = `
          <div class="error-msg">
            <div class="icon">✕</div>
            Error loading items:<br>
            <small>${error.message}</small>
          </div>`;
      }
    }

    // Global function to expand group
    window.expandGroup = function(groupIndex, totalItems) {
      const grid = document.querySelector(`#grid-${groupIndex}`);
      const moreBtn = document.querySelector(`#more-${groupIndex}`);
      
      // Show all items
      for (let i = 0; i < totalItems; i++) {
        const item = document.getElementById(`item-${groupIndex}-${i}`);
        if (item) item.style.display = 'block';
      }

      // Remove collapsed class and hide button
      grid.classList.remove('collapsed');
      if (moreBtn) moreBtn.style.display = 'none';
    };

    // Initialize page
    async function init() {
      const username = getUsernameFromUrl();

      if (!username) {
        const mainEl = document.getElementById('content');
        const loadMsg = document.getElementById('loading-msg');
        loadMsg.style.display = 'none';
        mainEl.innerHTML = `
          <div class="error-msg">
            <div class="icon">✕</div>
            No username provided. Please use: user.html?username=xyz
          </div>`;
        return;
      }

      // Update page title and header
      displayUsername = username.charAt(0).toUpperCase() + username.slice(1);
      document.getElementById('display-username').textContent = displayUsername;
      document.title = `${displayUsername}'s Collection`;

      // Apply theme preference
      try {
        const { data: { user } } = await supabase.auth.getUser();
        if (user?.user_metadata) {
          syncThemeFromUser(user.user_metadata);
        }
      } catch (e) {
        // No auth required for viewing public collections
      }

      // Fetch and display items
      fetchUserItems(username);
    }

    // Run on page load
    init();
  </script>

  <script src="js/navigation.js" defer></script>
  <script src="js/app.js" defer></script>
</body>
</html>
