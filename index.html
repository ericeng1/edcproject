<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item Entry Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- User bar: shown once logged in -->
  <div id="user-bar" class="user-bar" style="display:none;">
    <span id="user-email" class="user-email"></span>
    <a href="my-items.html" class="my-collection-link">My Collection →</a>
    <button id="signout-btn" class="signout-btn">Sign Out</button>
  </div>

  <div class="form-container">
    <h1>Add New Item</h1>

    <form id="itemForm">

      <!-- Brands -->
      <div class="form-group">
        <label for="maker">Brand</label>
        <select id="maker"></select>
      </div>

      <div class="form-group">
        <label for="category">Category</label>
        <div class="dropdown-wrapper">
          <select id="category"></select>
          <button type="button" class="add-btn" id="add-category-btn">+ Add Category</button>
        </div>
      </div>

      <div class="form-group">
        <label for="material">Material</label>
        <div class="dropdown-wrapper">
          <select id="material"></select>
          <button type="button" class="add-btn" id="add-material-btn">+ Add Material</button>
        </div>
      </div>

      <!-- Other Inputs -->
      <div class="form-group">
        <label for="born_on_date">Born On Date</label>
        <input type="date" id="born_on_date" />
      </div>

      <div class="form-group">
        <label for="msrp">MSRP</label>
        <input type="number" id="msrp" step="0.01" />
      </div>

      <div class="form-group">
        <label for="size">Size</label>
        <input type="number" id="size" step="0.01" />
      </div>

      <div class="form-group">
        <label for="variant">Variant</label>
        <input type="text" id="variant" />
      </div>

      <div class="form-group">
        <label for="extra">Extra</label>
        <input type="text" id="extra" />
      </div>

      <div class="form-group">
        <label for="comments">Comments</label>
        <textarea id="comments"></textarea>
      </div>


      <!-- Image Uploads (up to 10) -->
      <div class="form-group">
        <label for="image1">Image 1</label>
        <input type="file" id="image1" accept="image/*" />
        <img id="preview1" class="image-preview" alt="Preview 1" />
      </div>

      <div class="form-group">
        <label for="image2">Image 2</label>
        <input type="file" id="image2" accept="image/*" />
        <img id="preview2" class="image-preview" alt="Preview 2" />
      </div>

      <div class="form-group">
        <label for="image3">Image 3</label>
        <input type="file" id="image3" accept="image/*" />
        <img id="preview3" class="image-preview" alt="Preview 3" />
      </div>

      <div class="form-group">
        <label for="image4">Image 4</label>
        <input type="file" id="image4" accept="image/*" />
        <img id="preview4" class="image-preview" alt="Preview 4" />
      </div>

      <div class="form-group">
        <label for="image5">Image 5</label>
        <input type="file" id="image5" accept="image/*" />
        <img id="preview5" class="image-preview" alt="Preview 5" />
      </div>

      <div class="form-group">
        <label for="image6">Image 6</label>
        <input type="file" id="image6" accept="image/*" />
        <img id="preview6" class="image-preview" alt="Preview 6" />
      </div>

      <div class="form-group">
        <label for="image7">Image 7</label>
        <input type="file" id="image7" accept="image/*" />
        <img id="preview7" class="image-preview" alt="Preview 7" />
      </div>

      <div class="form-group">
        <label for="image8">Image 8</label>
        <input type="file" id="image8" accept="image/*" />
        <img id="preview8" class="image-preview" alt="Preview 8" />
      </div>

      <div class="form-group">
        <label for="image9">Image 9</label>
        <input type="file" id="image9" accept="image/*" />
        <img id="preview9" class="image-preview" alt="Preview 9" />
      </div>

      <div class="form-group">
        <label for="image10">Image 10</label>
        <input type="file" id="image10" accept="image/*" />
        <img id="preview10" class="image-preview" alt="Preview 10" />
      </div>

      <!-- Privacy Toggle -->
      <div class="form-group privacy-group">
        <label class="privacy-label">
          <input type="checkbox" id="is_private" />
          <span class="privacy-text">
            <strong>Private entry</strong> — only visible to you
          </span>
        </label>
      </div>

      <button type="submit" class="submit-btn">Save Item</button>

      <p id="status" class="status"></p>

    </form>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
